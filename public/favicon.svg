<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0d0d20"/>
  <rect x="3" y="3" width="94" height="94" rx="16" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.4"/>
  <!-- Left sword -->
  <g transform="translate(50,50) rotate(-45)">
    <rect x="-3" y="-30" width="6" height="40" rx="1" fill="#f5a623"/>
    <rect x="-3" y="-32" width="6" height="6" rx="1" fill="#e8951f"/>
    <rect x="-10" y="8" width="20" height="5" rx="2" fill="#c0802a"/>
    <rect x="-2" y="13" width="4" height="8" rx="1" fill="#8b6914"/>
  </g>
  <!-- Right sword -->
  <g transform="translate(50,50) rotate(45)">
    <rect x="-3" y="-30" width="6" height="40" rx="1" fill="#f5a623"/>
    <rect x="-3" y="-32" width="6" height="6" rx="1" fill="#e8951f"/>
    <rect x="-10" y="8" width="20" height="5" rx="2" fill="#c0802a"/>
    <rect x="-2" y="13" width="4" height="8" rx="1" fill="#8b6914"/>
  </g>
  <!-- Glow center -->
  <circle cx="50" cy="50" r="6" fill="#f5a623" opacity="0.3"/>
</svg>
